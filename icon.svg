<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="gFold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
  </defs>

  <!-- Background note (slightly offset, muted) -->
  <rect x="54" y="38" width="164" height="178" rx="16" fill="rgba(124,58,237,0.18)"/>

  <!-- Main note body -->
  <rect x="36" y="32" width="172" height="184" rx="18" fill="url(#gMain)"/>

  <!-- Folded corner -->
  <path d="M164 32 Q208 32 208 76 L164 76 Z" fill="url(#gFold)" opacity="0.55"/>
  <path d="M164 32 L164 76 L208 76" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>

  <!-- Content lines -->
  <rect x="62" y="100" width="120" height="5" rx="2.5" fill="rgba(255,255,255,0.38)"/>
  <rect x="62" y="120" width="90"  height="5" rx="2.5" fill="rgba(255,255,255,0.28)"/>
  <rect x="62" y="140" width="108" height="5" rx="2.5" fill="rgba(255,255,255,0.20)"/>

  <!-- Ink drop accent -->
  <circle cx="152" cy="172" r="11" fill="url(#inkGrad)" opacity="0.82"/>
  <circle cx="160" cy="165" r="4.5" fill="url(#inkGrad)" opacity="0.52"/>
</svg>
